# Server Configuration
server.port=8080
# CRITICAL SECURITY: Bind to localhost/127.0.0.1 for local testing to avoid exposure to external network interfaces
server.address=127.0.0.1

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/floravision
spring.datasource.username=root
# SECURE CONFIGURATION: Pull password dynamically from env variable DB_PASSWORD. Fallback to empty for local test.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# Automatically update the database schema based on Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Security: Suppress exposing detailed database exception stacktraces in error responses to clients
server.error.include-stacktrace=never
server.error.include-message=always
